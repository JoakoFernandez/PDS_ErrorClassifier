version: '3.9'

services:
  # ── PDS Error Classifier API ──────────────────────────────────────────────
  api:
    build: .
    container_name: pds-error-classifier
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_FALLBACK_ENABLED=true
      - LOG_FORMAT=pretty
      - LOG_LEVEL=debug
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pds-network

  # ── Redis Cache ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pds-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes  # Persist data across restarts
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pds-network

  # ── Redis Commander (optional GUI) ────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: pds-redis-ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - pds-network
    profiles:
      - debug  # Only starts with: docker compose --profile debug up

volumes:
  redis-data:

networks:
  pds-network:
    driver: bridge
